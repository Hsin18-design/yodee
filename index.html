<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>感知與偏好量表</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  :root {
    --ink: #1a1f3c;
    --indigo: #2d3a8c;
    --indigo-light: #4a5abf;
    --indigo-pale: #eef0fa;
    --cream: #f8f7f3;
    --gold: #c9a84c;
    --muted: #6b7280;
    --border: #e2e4ef;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--indigo);
    padding: 28px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .site-header .logo-mark {
    width: 36px; height: 36px;
    background: var(--gold);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: white; font-size: 18px;
    flex-shrink: 0;
  }
  .site-header h1 {
    color: white; font-size: 20px; font-weight: 500; letter-spacing: 0.05em;
  }
  .site-header span {
    color: rgba(255,255,255,0.5); font-size: 13px; margin-left: auto;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    background: var(--indigo);
    padding: 0 40px 20px;
  }
  .progress-bar-bg {
    height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px;
  }
  .progress-bar-fill {
    height: 4px; background: var(--gold); border-radius: 2px;
    transition: width 0.3s ease;
  }
  .progress-label {
    color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 6px; text-align: right;
  }

  /* ── MAIN ── */
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── INTRO ── */
  #screen-intro {
    text-align: center;
    padding: 60px 0;
  }
  #screen-intro h2 {
    font-size: 32px; font-weight: 700; color: var(--indigo); margin-bottom: 12px;
  }
  #screen-intro .tagline {
    color: var(--muted); font-size: 15px; line-height: 1.7; margin-bottom: 36px;
  }
  .info-grid {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 40px;
  }
  .info-card {
    background: white; border-radius: var(--radius); padding: 20px;
    border: 1px solid var(--border);
  }
  .info-card .num { font-size: 28px; font-weight: 700; color: var(--indigo); }
  .info-card .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .name-input-wrap { max-width: 340px; margin: 0 auto 32px; }
  .name-input-wrap label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; text-align: left; }
  .name-input-wrap input {
    width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
    border-radius: 8px; font-family: inherit; font-size: 15px; outline: none;
    transition: border-color 0.2s;
  }
  .name-input-wrap input:focus { border-color: var(--indigo-light); }

  /* ── QUESTION CARD ── */
  .q-card {
    background: white; border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 32px;
    margin-bottom: 20px;
  }
  .q-part-label {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--gold); font-weight: 700; margin-bottom: 8px;
  }
  .q-num { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

  .options { display: flex; flex-direction: column; gap: 12px; }
  .option-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: white;
    cursor: pointer;
    font-family: inherit; font-size: 15px; color: var(--ink);
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
  }
  .option-btn:hover { border-color: var(--indigo-light); background: var(--indigo-pale); }
  .option-btn.selected {
    border-color: var(--indigo);
    background: var(--indigo-pale);
    color: var(--indigo);
    font-weight: 500;
  }
  .option-btn .key {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--indigo-pale); color: var(--indigo);
    font-size: 12px; font-weight: 700; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .option-btn.selected .key { background: var(--indigo); color: white; }

  /* ── NAV BUTTONS ── */
  .nav-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 24px;
  }
  .btn-primary {
    background: var(--indigo); color: white;
    padding: 13px 28px; border-radius: 8px;
    border: none; font-family: inherit; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--indigo-light); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost {
    background: none; border: 1.5px solid var(--border);
    color: var(--muted); padding: 12px 24px; border-radius: 8px;
    font-family: inherit; font-size: 14px; cursor: pointer;
    transition: border-color 0.2s;
  }
  .btn-ghost:hover { border-color: var(--muted); }

  /* ── RESULT ── */
  #screen-result { display: none; }
  .result-header {
    background: var(--indigo); border-radius: var(--radius);
    padding: 32px; margin-bottom: 24px; color: white;
    display: flex; justify-content: space-between; align-items: center;
  }
  .result-header h2 { font-size: 22px; font-weight: 600; }
  .result-header .meta { font-size: 13px; opacity: 0.7; margin-top: 4px; }
  .result-header .score-badge {
    background: var(--gold); color: white;
    border-radius: 8px; padding: 8px 16px;
    font-size: 13px; font-weight: 700; text-align: center;
  }

  .result-section { margin-bottom: 32px; }
  .result-section h3 {
    font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold); font-weight: 700; margin-bottom: 16px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }

  .score-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
  }
  .score-cell {
    background: white; border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 10px; text-align: center;
  }
  .score-cell .trait-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .score-cell .trait-name { font-size: 11px; color: var(--muted); margin-bottom: 6px; min-height: 28px; line-height: 1.4; }
  .score-cell .trait-val {
    font-size: 24px; font-weight: 700; color: var(--indigo); line-height: 1;
  }
  .score-cell .bar-bg {
    height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px;
  }
  .score-cell .bar-fill {
    height: 4px; background: var(--indigo-light); border-radius: 2px;
    transition: width 0.6s ease;
  }

  /* radar */
  .radar-wrap {
    background: white; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
    display: flex; gap: 16px; align-items: flex-start;
    flex-wrap: wrap; justify-content: center;
  }
  .radar-wrap canvas { max-width: 100%; }

  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--ink); margin-bottom: 6px;
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }

  /* PDF btn */
  .pdf-row { display: flex; justify-content: center; margin-top: 32px; gap: 12px; }
  .btn-pdf {
    background: var(--indigo); color: white;
    padding: 14px 36px; border-radius: 8px;
    border: none; font-family: inherit; font-size: 15px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: background 0.2s;
  }
  .btn-pdf:hover { background: var(--indigo-light); }
  .btn-restart {
    background: white; color: var(--muted);
    padding: 14px 24px; border-radius: 8px;
    border: 1.5px solid var(--border); font-family: inherit; font-size: 14px;
    cursor: pointer; transition: border-color 0.2s;
  }
  .btn-restart:hover { border-color: var(--muted); }

  @media (max-width: 600px) {
    .site-header { padding: 20px; }
    .container { padding: 24px 16px 60px; }
    .info-grid { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .score-grid { grid-template-columns: repeat(4,1fr); }
    .radar-wrap { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="site-header">
  <div class="logo-mark">感</div>
  <h1>感知與偏好量表</h1>
  <span id="header-info" style="display:none"></span>
</div>
<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="progress-label" id="progress-label" style="margin-bottom:6px;">0 / 90</div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<div class="container">

  <!-- INTRO -->
  <div id="screen-intro">
    <h2>了解你的感知模式</h2>
    <p class="tagline">
      本量表分為兩個部份，共 90 組敘述。<br>
      每組有兩個敘述，請選一個最能形容你或最能表達你感受的敘述。<br>
      儘量做快一點，每題看完後立刻作答，不要思考太久。
    </p>
    <div class="info-grid">
      <div class="info-card"><div class="num">90</div><div class="lbl">題目數量</div></div>
      <div class="info-card"><div class="num">20</div><div class="lbl">測量維度</div></div>
      <div class="info-card"><div class="num">15</div><div class="lbl">分鐘完成</div></div>

    </div>
    <div class="name-input-wrap">
      <label>受測者姓名（將顯示於結果頁）</label>
      <input type="text" id="name-input" placeholder="請輸入姓名" />
    </div>
    <button class="btn-primary" onclick="startQuiz()">開始測驗</button>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" style="display:none">
    <div class="q-card">
      <div class="q-part-label" id="q-part"></div>
      <div class="q-num" id="q-num"></div>
      <div class="options" id="q-options"></div>
    </div>
    <div class="nav-row">
      <button class="btn-ghost" id="btn-prev" onclick="goPrev()">← 上一題</button>
      <button class="btn-primary" id="btn-next" onclick="goNext()">下一題 →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result">
    <div class="result-header" id="result-header">
      <div>
        <h2 id="result-name">結果報告</h2>
        <div class="meta" id="result-date"></div>
      </div>
      <div class="score-badge">感知與偏好量表<br>個人結果</div>
    </div>

    <!-- Part 1 scores -->
    <div class="result-section">
      <h3>第一部份 — 行為感知特質（A–J）</h3>
      <div class="score-grid" id="scores-upper"></div>
    </div>

    <!-- Part 2 scores -->
    <div class="result-section">
      <h3>第二部份 — 動機偏好特質（a–j）</h3>
      <div class="score-grid" id="scores-lower"></div>
    </div>

    <!-- Radar -->
    <div class="result-section">
      <h3>雷達圖總覽</h3>
      <div class="radar-wrap">
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0;">
          <canvas id="radar-canvas-upper" width="360" height="360"></canvas>
          <div style="font-size:12px;color:#6b7280;">▲ 行為感知特質（A–J）</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0;">
          <canvas id="radar-canvas-lower" width="360" height="360"></canvas>
          <div style="font-size:12px;color:#6b7280;">▲ 動機偏好特質（a–j）</div>
        </div>
      </div>
      <!-- Legend row -->
      <div style="display:flex;gap:40px;flex-wrap:wrap;margin-top:20px;background:white;border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;">
        <div id="legend-upper" style="flex:1;min-width:200px;"></div>
        <div id="legend-lower" style="flex:1;min-width:200px;"></div>
      </div>
    </div>

    <div class="pdf-row">
      <button class="btn-pdf" onclick="downloadPDF()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        下載 PDF 結果
      </button>
      <button class="btn-restart" onclick="restartQuiz()">重新測驗</button>
    </div>
  </div>

</div>

<script>

  f:'親和需求', g:'喜新性', h:'批判性', i:'崇拜性', j:'受役性'
};

  // Part 2 (q46–90)
  {p:2,a:"我喜歡人家告訴我做什麼",ta:"j",b:"我起頭的事必須把它做完",tb:"a",ans:1},
  {p:2,a:"我喜歡取悅我仰慕的人",ta:"i",b:"我要做個成功的人",tb:"b",ans:1},

  {p:2,a:"我喜歡做新鮮不同的事",ta:"g",b:"我喜歡談論我如何把事情做成功",tb:"d",ans:0},

// ── STATE ─────────────────────────────────────────────────────────────
let currentQ = 0;
let answers = new Array(90).fill(null);
let userName = '';
let currentScores = {};
// ── QUIZ LOGIC ────────────────────────────────────────────────────────
function startQuiz() {
  userName = document.getElementById('name-input').value.trim() || '受測者';
  document.getElementById('screen-intro').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('header-info').style.display = 'inline';
  document.getElementById('header-info').textContent = userName;

  renderQuestion();
}

function renderQuestion() {
  const q = RAW[currentQ];
  const partLabel = q.p === 1 ? '第一部份' : '第二部份';
  document.getElementById('q-part').textContent = partLabel;
  document.getElementById('q-num').textContent = `第 ${currentQ + 1} 題，共 90 題`;

  const opts = document.getElementById('q-options');
  opts.innerHTML = '';

  ['a','b'].forEach((key, idx) => {
    const text = key === 'a' ? q.a : q.b;
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[currentQ] === idx ? ' selected' : '');
    btn.innerHTML = `<span class="key">${String.fromCharCode(65+idx)}</span>${text}`;
    btn.onclick = () => selectAnswer(idx);
    opts.appendChild(btn);
  });

  // prev/next
  document.getElementById('btn-prev').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
  const isLast = currentQ === RAW.length - 1;
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = isLast ? '查看結果 →' : '下一題 →';

  // progress
  const pct = ((currentQ + 1) / 90 * 100).toFixed(0);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${currentQ + 1} / 90`;
}

function selectAnswer(idx) {
  answers[currentQ] = idx;
  renderQuestion();
}

function goPrev() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}

function goNext() {
  if (answers[currentQ] === null) {
    alert('請先選擇一個答案後再繼續。');
    return;
  }
  if (currentQ < RAW.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

// ── SCORING ───────────────────────────────────────────────────────────
function calcScores() {
  const scores = {};
  [...'ABCDEFGHIJabcdefghij'].forEach(t => scores[t] = 0);

  RAW.forEach((q, i) => {
    const chosen = answers[i]; // 0=A option, 1=B option
    if (chosen === null) return;
    // Every answer scores the trait of whichever option was chosen
    const trait = chosen === 0 ? q.ta : q.tb;
    scores[trait] = (scores[trait] || 0) + 1;
  });
  return scores;
}

// ── RESULT ────────────────────────────────────────────────────────────
function showResult() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  const result = document.getElementById('screen-result');
  result.style.display = 'block';

  const scores = calcScores();
  currentScores = scores;
  document.getElementById('result-name').textContent = userName + ' 的結果報告';
  const now = new Date();
  document.getElementById('result-date').textContent =

  // Upper scores (A-J)
  const upperGrid = document.getElementById('scores-upper');

// ── RADAR ─────────────────────────────────────────────────────────────
function drawRadar(scores) {
  function drawSingleRadar(canvasId, traits, nameMap, color, alpha) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W/2, cy = H/2, R = Math.min(W,H)/2 - 36;
    const n = traits.length;
    const MAX = 9;
    const vals = traits.map(t => (scores[t]||0)/MAX);

    ctx.clearRect(0,0,W,H);

    // grid rings
    for (let ring = 1; ring <= 4; ring++) {
      ctx.beginPath();
      for (let i = 0; i < n; i++) {
        const angle = (i / n) * Math.PI * 2 - Math.PI/2;
        const r = R * ring / 4;
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);
        i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.closePath();
      ctx.strokeStyle = 'rgba(100,110,180,0.13)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // axes + labels
    traits.forEach((t, i) => {
      const angle = (i / n) * Math.PI * 2 - Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
      ctx.strokeStyle = 'rgba(100,110,180,0.2)';
      ctx.lineWidth = 1;
      ctx.stroke();

      const lx = cx + (R+20) * Math.cos(angle);
      const ly = cy + (R+20) * Math.sin(angle);
      ctx.fillStyle = '#2d3a8c';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(t, lx, ly);
    });

    // value labels on axes (score numbers)
    traits.forEach((t, i) => {
      const v = scores[t] || 0;
      const angle = (i / n) * Math.PI * 2 - Math.PI/2;
      const r = R * v / MAX;
      if (v === 0) return;
      const lx = cx + (r + 10) * Math.cos(angle);
      const ly = cy + (r + 10) * Math.sin(angle);
      ctx.fillStyle = color;
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(v, lx, ly);
    });

    // fill polygon
    ctx.beginPath();
    vals.forEach((v, i) => {
      const angle = (i / n) * Math.PI * 2 - Math.PI/2;
      const r = R * v;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.closePath();
    const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,R);
    grad.addColorStop(0, color.replace('1)', `${alpha})`));
    grad.addColorStop(1, color.replace('1)', `${alpha*0.2})`));
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // dots
    vals.forEach((v, i) => {
      const angle = (i / n) * Math.PI * 2 - Math.PI/2;
      const r = R * v;
      ctx.beginPath();
      ctx.arc(cx + r*Math.cos(angle), cy + r*Math.sin(angle), 5, 0, Math.PI*2);
      ctx.fillStyle = 'white';
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
    });
  }

  const traitsU = 'ABCDEFGHIJ'.split('');
  const traitsL = 'abcdefghij'.split('');
  drawSingleRadar('radar-canvas-upper', traitsU, TRAIT_NAMES_UPPER, 'rgba(45,58,140,1)', 0.28);
  drawSingleRadar('radar-canvas-lower', traitsL, TRAIT_NAMES_LOWER, 'rgba(201,168,76,1)', 0.28);

  // legend (two columns)
  const lu = document.getElementById('legend-upper');
  const ll = document.getElementById('legend-lower');
  lu.innerHTML = '<div style="font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;font-weight:700;">行為感知（A–J）</div>';
  traitsU.forEach(t => {
    lu.innerHTML += `<div class="legend-item"><span class="legend-dot" style="background:#2d3a8c"></span><span style="font-weight:600;min-width:18px">${t}</span> ${TRAIT_NAMES_UPPER[t]} <span style="margin-left:auto;font-weight:700;color:#2d3a8c">${scores[t]||0}</span></div>`;
  });
  ll.innerHTML = '<div style="font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;font-weight:700;">動機偏好（a–j）</div>';
  traitsL.forEach(t => {
    ll.innerHTML += `<div class="legend-item"><span class="legend-dot" style="background:#c9a84c"></span><span style="font-weight:600;min-width:18px">${t}</span> ${TRAIT_NAMES_LOWER[t]} <span style="margin-left:auto;font-weight:700;color:#c9a84c">${scores[t]||0}</span></div>`;
  });
}

    'abcdefghij'.split('').forEach(t => {
      legHtml += `<div style="display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:5px;"><span style="width:8px;height:8px;border-radius:50%;background:#c9a84c;flex-shrink:0;display:inline-block;"></span><span style="font-weight:600;min-width:16px">${t}</span> ${TRAIT_NAMES_LOWER[t]} <span style="margin-left:auto;font-weight:700;color:#c9a84c;">${scores[t]||0}</span></div>`;

    printDiv.innerHTML += legHtml;

    document.body.appendChild(printDiv);

    // Capture the clean print div
    const canvas = await html2canvas(printDiv, {
      scale: 2,

      backgroundColor: '#f8f7f3',
      logging: false,
      width: 794,
    });

    document.body.removeChild(printDiv);

    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
    const pW = 210, pH = 297, margin = 10;
    const usableW = pW - margin*2;
    const usableH = pH - margin*2;
    const totalImgH = (canvas.height / canvas.width) * usableW;

    if (totalImgH <= usableH) {
      pdf.addImage(imgData, 'JPEG', margin, margin, usableW, totalImgH);
    } else {
      // slice into pages without cutting mid-element
      const scale = canvas.width / usableW; // px per mm
      const pageHeightPx = usableH * scale;
      let offsetPx = 0;
      while (offsetPx < canvas.height) {
        const sliceHeightPx = Math.min(pageHeightPx, canvas.height - offsetPx);
        const sliceCanvas = document.createElement('canvas');
        sliceCanvas.width = canvas.width;
        sliceCanvas.height = sliceHeightPx;
        const sctx = sliceCanvas.getContext('2d');
        sctx.drawImage(canvas, 0, -offsetPx);
        const sliceH = sliceHeightPx / scale;
        pdf.addImage(sliceCanvas.toDataURL('image/jpeg', 0.95), 'JPEG', margin, margin, usableW, sliceH);
        offsetPx += sliceHeightPx;
        if (offsetPx < canvas.height) pdf.addPage();
      }
    }

    const fname = `感知偏好量表_${userName}_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.pdf`;
    pdf.save(fname);
  } catch(e) {
    alert('PDF 產生失敗，請嘗試使用瀏覽器的「列印 → 另存PDF」功能。');
    console.error(e);
  }

  btn.innerHTML = origHTML;
  btn.disabled = false;
}



  if (!confirm('確定要重新開始？目前的答案將會清除。')) return;
  currentQ = 0;
  answers = new Array(90).fill(null);
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-intro').style.display = 'block';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('header-info').style.display = 'none';
  document.getElementById('name-input').value = '';
  window.scrollTo(0,0);
}
